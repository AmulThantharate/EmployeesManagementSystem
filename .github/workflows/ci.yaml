name: CI/CD Pipeline

on:
  push:
    branches: ["master"]

# env:
  # DOCKER_IMAGE_NAME: employees-management-system

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate Tag
        id: meta
        run: |
          TAG="v${GITHUB_RUN_NUMBER}-$(echo $GITHUB_SHA | cut -c1-7)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  install_build_and_test:
    name: Install, Build, and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Respository
        uses: actions/checkout@v4

      - name: Setup .Net Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Install Dependecies
        run: dotnet restore

      - name: Build Project
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  fs_scan:
    name: File SystemScan
    runs-on: ubuntu-latest
    needs: install_build_and_test
    permissions:
      security-events: write
    steps:
      - name: Chekout Code 
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs.sarif"
          exit-code: 0
          severity: 'HIGH,CRITICAL'
      
      - name: Upload Trivy FS SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif-file: "trivy-fs.sarif"
          category: "trivy-fs-scan"
         