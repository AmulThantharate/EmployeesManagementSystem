name: Deploy Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  initialize:
    name: initialize
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.output.tag}}
    steps:
      - uses: actions/checkout@v4
      - name: Generate Tag
        run: |
          TAG="v${GITHUB_RUN_NUMBER}-$(echo $GITHUB_SHA | cut -c1-7)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
  restore:
    name: Restore
    runs-on: ubuntu-latest
    needs: initialize
    steps:
      - uses: actions/checkout@v4
        name: Setup .Net Core
      - uses: actions/setup-dotnet@v4
        with:
          dontnet-version: "10.0.x"
      - name: Restore Dependencies
        run: dotnet restore
  build:
    name: Build dependcies
    runs-on: ubuntu-latest
    needs: restore
    steps:
      - uses: actions/checkout@v4
        name: Setup .Net Core
      - uses: actions/setup-dotnet@v4
        with:
          dontnet-version: "10.0.x"
      - name: Build Project
        run: dotnet build --configuration Release
  unit_tests:
    name: Running Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        name: Setup .Net Core
      - uses: actions/setup-dotnet@v4
        with:
          dontnet-version: "10.0.x"
      - name: Run Test
        run: dotnet  test --configuration Release --verbosity normal
  fs_scan:
    name: FS Scan
    runs-on: ubuntu-latest
    needs: unit_tests
    permissions:
      security-events: write
    steps:
      - name: Chekout Code
        uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs.sarif"
          exit-code: 0
          severity: "HIGH,CRITICAL"
      - name: Upload Trivy FS SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-fs.sarif"
          category: "trivy-fs-scan"
  docker_build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: ["build", "unit_tests", "fs_scan"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build And Export
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: employees-management-system:local
          outputs: type=docekr,dest=/tmp/image.tar
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/image.tar
