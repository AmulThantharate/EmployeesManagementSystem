name: .NET smoke tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  smoke-tests:
    name: Run smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore EmployeesManagementSystem.slnx

      - name: Build
        run: dotnet build EmployeesManagementSystem.slnx --configuration Release --no-restore

      - name: Run smoke tests
        run: dotnet test EmployeesManagementSystem.Tests/EmployeesManagementSystem.Tests.csproj --configuration Release --no-build --verbosity normal
